services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: iron_defer
      POSTGRES_PASSWORD: iron_defer
      POSTGRES_DB: iron_defer
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iron_defer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata-dev:
